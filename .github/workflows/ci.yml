name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - demo-stable
      - 'feature/sales-operations'
      - 'feature/**'
  pull_request:
    branches:
      - main
      - master
      - demo-stable
  workflow_dispatch:  # allow manual trigger from GitHub Actions UI

# ─────────────────────────────────────────────────────────────────────────────
# Job 1: Backend — syntax check + pytest
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  backend-ci:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Syntax check (all .py files)
        run: |
          python -m py_compile $(find backend/app -name "*.py" | tr '\n' ' ')
          echo "✅ All Python files parsed OK"

      - name: Run backend tests
        working-directory: backend
        env:
          SQLALCHEMY_DATABASE_URI: sqlite+aiosqlite:///:memory:
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci_test_secret_key_not_for_production_1234567
          ENVIRONMENT: development
        run: |
          pytest app/tests/ -v \
            --ignore=app/tests/test_hardening_redis_lock.py \
            -x \
            --tb=short

# ─────────────────────────────────────────────────────────────────────────────
# Job 2: Frontend — TypeScript check + Vite build
# ─────────────────────────────────────────────────────────────────────────────
  frontend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# Job 3: Deploy to DigitalOcean (only on demo-stable or main)
# Requires GitHub secrets:
#   DO_SSH_KEY        — private key (contents of ~/.ssh/id_rsa)
#   DO_HOST           — droplet IP or hostname (e.g. 123.45.67.89)
#   DO_USER           — SSH username (typically root or deploy)
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [ backend-ci, frontend-ci ]
    if: github.ref == 'refs/heads/demo-stable' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to DigitalOcean droplet
        env:
          HOST: ${{ secrets.DO_HOST }}
          USER: ${{ secrets.DO_USER }}
        run: |
          echo "▶ Deploying to $HOST..."

          # Sync frontend dist to Nginx static root
          rsync -avz --delete \
            frontend/dist/ \
            $USER@$HOST:/var/www/crm-saas/frontend/

          # On the server: pull latest code, rebuild Docker, run migrations
          ssh $USER@$HOST << 'EOF'
            set -e
            cd /opt/crm-saas

            echo "── Pulling latest code ──"
            git fetch origin
            git reset --hard origin/$(git branch --show-current)

            echo "── Running Alembic migrations ──"
            docker compose exec -T backend alembic upgrade head

            echo "── Restarting backend (zero-downtime) ──"
            docker compose pull backend
            docker compose up -d --no-deps --build backend

            echo "── Reloading Nginx ──"
            docker compose exec -T nginx nginx -s reload

            echo "✅ Deploy complete"
          EOF

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Deployed to https://${{ secrets.DO_HOST }} from branch ${GITHUB_REF_NAME}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deploy failed — check logs above"
