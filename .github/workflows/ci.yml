name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest pytest-asyncio httpx

    - name: Run Syntax & Lint Checks
      run: |
        # Basic check to catch syntax errors
        python -m py_compile $(find backend/ -name "*.py")

    - name: Run Backend Tests
      run: |
        cd backend
        # Use SQLite for testing in CI to avoid spinning up full docker postgres/redis unless required
        export SQLALCHEMY_DATABASE_URI="sqlite+aiosqlite:///:memory:"
        export REDIS_URL="redis://localhost:6379/0"
        # We can run mock-supported tests that don't depend on live Redis,
        # or we can spin up a redis service container if needed.
        # Let's spin up Redis service for test coverage completeness!
        pytest app/tests/ -v --ignore=app/tests/test_hardening_redis_lock.py
      services:
        redis:
          image: redis:alpine
          ports:
            - 6379:6379
          options: >-
            --health-cmd "redis-cli ping"
            --health-interval 10s
            --health-timeout 5s
            --health-retries 5

  frontend-ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: Build Frontend Production Bundle
      run: |
        cd frontend
        npm run build
