events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip Compression
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ── Rate limiting zone (shared across workers) ─────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=2r/s;

    # ── HTTP → HTTPS redirect ───────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # ── TLS certificates ─────────────────────────────────────────────────
        # Place your certificate and key at the paths below.
        # With Let's Encrypt / certbot, these are typically:
        #   /etc/letsencrypt/live/<your-domain>/fullchain.pem
        #   /etc/letsencrypt/live/<your-domain>/privkey.pem
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # ── TLS hardening ────────────────────────────────────────────────────
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache   shared:SSL:50m;
        ssl_session_tickets off;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── HTTP Security Headers ────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; frame-ancestors 'none';" always;

        root /usr/share/nginx/html;
        index index.html;

        # ── Frontend client routing fallback ──────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Static assets — long-lived cache (Vite hashes filenames) ─────────
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, no-transform";
            access_log off;
        }

        # ── Backend API reverse proxy ─────────────────────────────────────────
        location /api {
            # Apply rate limiting: burst of 20 with nodelay
            limit_req zone=api burst=20 nodelay;
            limit_req_status 429;

            # Cap request bodies at the edge (lead import is 2MB; small headroom).
            client_max_body_size 3m;

            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── Health check (no rate limit) ──────────────────────────────────────
        location /health {
            proxy_pass http://backend:8000/health;
            proxy_set_header Host $host;
            access_log off;
        }
    }
}
